name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Update sitemap.xml lastmod date
        run: |
          # 현재 날짜를 YYYY-MM-DD 형식으로 가져오기
          CURRENT_DATE=$(date +%Y-%m-%d)
          # sitemap.xml의 lastmod 날짜를 현재 날짜로 업데이트
          sed -i.bak "s|<lastmod>.*</lastmod>|<lastmod>${CURRENT_DATE}</lastmod>|" sitemap.xml
          rm -f sitemap.xml.bak
          echo "Updated sitemap.xml lastmod to: ${CURRENT_DATE}"

      - name: Copy static files to dist
        run: |
          cp browser-compatibility-check.js dist/ 2>/dev/null || true
          cp style.css dist/ 2>/dev/null || true
          cp og-image.png dist/ 2>/dev/null || true
          cp robots.txt dist/ 2>/dev/null || true
          cp sitemap.xml dist/ 2>/dev/null || true
          cp index.html dist/ 2>/dev/null || true
          cp -r assets dist/ 2>/dev/null || true
      
      - name: Add static script tags to dist/app.html
        run: |
          # dist/app.html에 browser-compatibility-check.js 스크립트 태그 추가
          sed -i.bak 's|</body>|    <script type="module" src="browser-compatibility-check.js"></script>\n</body>|' dist/app.html
          rm -f dist/app.html.bak

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'
          # Vite 빌드 결과물(dist/)을 배포

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: 'dist'
          # Vite 빌드 결과물(dist/)을 배포
      
      - name: Submit sitemap to Google Search Console
        run: |
          echo "🔔 Notifying Google Search Console about sitemap update..."
          # Google에 sitemap 업데이트 알림 (ping)
          curl -s "https://www.google.com/ping?sitemap=https://laguyo87.github.io/seating-arrangement-program/sitemap.xml" || echo "⚠️ Google ping failed (this is optional)"
          echo "✅ Sitemap notification sent to Google"
